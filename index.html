<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>雞蛋戰車 SVG 迷宮戰</title>
  <style>
    :root {
      --bg: #121416;
      --panel: rgba(18, 20, 22, 0.82);
      --line: rgba(255,255,255,0.14);
      --text: #f4f1df;
      --muted: #b9b6aa;
      --orange: #ff9d25;
      --yellow: #ffe45c;
      --green: #1e5b35;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 10%, rgba(255, 184, 71, 0.12), transparent 28%),
        radial-gradient(circle at 80% 90%, rgba(62, 201, 126, 0.12), transparent 30%),
        linear-gradient(135deg, #0d0f10, #1c2023 54%, #101214);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      overflow: hidden;
    }

    .game-shell {
      width: min(96vw, 1080px);
      padding: 18px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      box-shadow: 0 24px 80px rgba(0,0,0,0.46), inset 0 1px 0 rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
    }

    .hud {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }

    .card {
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .title-card {
      text-align: center;
      min-width: 250px;
    }

    .title-card strong {
      display: block;
      font-size: 20px;
      letter-spacing: 0.08em;
    }

    .title-card span {
      color: var(--muted);
      font-size: 12px;
    }

    .stats {
      display: grid;
      gap: 7px;
      font-size: 13px;
    }

    .stat-row {
      display: grid;
      grid-template-columns: 78px 1fr 32px;
      gap: 8px;
      align-items: center;
    }

    .bar {
      height: 10px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 999px;
      background: rgba(0,0,0,0.24);
    }

    .bar > i {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: inherit;
      transition: width 180ms ease;
    }

    #playerHpBar { background: linear-gradient(90deg, #fff479, #f2b431); }
    #enemyHpBar { background: linear-gradient(90deg, #45d379, #16613b); }

    .score {
      text-align: right;
      font-size: 14px;
      color: var(--muted);
    }

    .score b {
      color: #fff;
      font-size: 20px;
    }

    .stage-wrap {
      position: relative;
      overflow: hidden;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.14);
      background: #22272a;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.45);
    }

    svg {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      cursor: crosshair;
    }

    .help {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .kbd {
      display: inline-block;
      min-width: 20px;
      padding: 1px 6px;
      border: 1px solid rgba(255,255,255,0.22);
      border-bottom-color: rgba(255,255,255,0.1);
      border-radius: 6px;
      background: rgba(0,0,0,0.25);
      color: #fff;
      font-size: 11px;
      text-align: center;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      background: radial-gradient(circle, rgba(0,0,0,0.25), rgba(0,0,0,0.7));
      z-index: 5;
    }

    .overlay.active { display: grid; }

    .modal {
      width: min(430px, 88%);
      padding: 26px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 24px;
      background: rgba(17, 20, 22, 0.92);
      box-shadow: 0 22px 80px rgba(0,0,0,0.5);
    }

    .modal h2 {
      margin: 0 0 8px;
      font-size: 30px;
    }

    .modal p {
      margin: 0 0 20px;
      color: var(--muted);
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 10px 18px;
      color: #1c1508;
      background: linear-gradient(135deg, #ffe46e, #ff9c2f);
      box-shadow: 0 8px 20px rgba(255,157,37,0.25), inset 0 1px 0 rgba(255,255,255,0.55);
      font-weight: 800;
      cursor: pointer;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(1px); }

    .treadStripe {
      stroke-dasharray: 6 7;
      stroke-dashoffset: 0;
    }

    .tank.moving .treadStripe {
      animation: treadRoll 0.16s linear infinite;
    }

    @keyframes treadRoll {
      to { stroke-dashoffset: -26; }
    }

    .hitFlash {
      animation: hitBlink 0.18s linear infinite;
    }

    @keyframes hitBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.42; }
    }

    .pixel-text {
      paint-order: stroke;
      stroke: rgba(0,0,0,0.55);
      stroke-width: 4px;
      stroke-linejoin: round;
      font-weight: 900;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <main class="game-shell">
    <section class="hud">
      <div class="card stats">
        <div class="stat-row"><span>玩家蛋車</span><div class="bar"><i id="playerHpBar"></i></div><b id="playerHpText">3</b></div>
        <div class="stat-row"><span>敵方蛋車</span><div class="bar"><i id="enemyHpBar"></i></div><b id="enemyHpText">3</b></div>
      </div>
      <div class="card title-card">
        <strong>雞蛋戰車 SVG 迷宮戰</strong>
        <span>Egg Tank SVG Maze Battle</span>
      </div>
      <div class="card score">分數<br><b id="scoreText">0</b></div>
    </section>

    <section class="stage-wrap">
      <svg id="gameSvg" viewBox="0 0 960 640" role="img" aria-label="SVG 雞蛋戰車迷宮遊戲">
        <defs>
          <pattern id="groundNoise" width="36" height="36" patternUnits="userSpaceOnUse">
            <rect width="36" height="36" fill="#252a2d" />
            <circle cx="5" cy="7" r="0.9" fill="#ffffff" opacity="0.08" />
            <circle cx="27" cy="12" r="0.7" fill="#ffffff" opacity="0.07" />
            <circle cx="17" cy="29" r="0.8" fill="#000000" opacity="0.18" />
            <path d="M0 35.5H36 M35.5 0V36" stroke="#ffffff" opacity="0.04" />
          </pattern>

          <pattern id="brickPattern" width="40" height="40" patternUnits="userSpaceOnUse">
            <rect width="40" height="40" fill="#7b392b" />
            <path d="M0 0H40V40H0Z" fill="none" stroke="#4e211a" stroke-width="2" opacity="0.65" />
            <path d="M0 13H40 M0 27H40 M20 0V13 M10 13V27 M30 13V27 M20 27V40" stroke="#a65a3e" stroke-width="2" opacity="0.85" />
            <path d="M2 2H38" stroke="#d88658" opacity="0.22" />
          </pattern>

          <linearGradient id="steelGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#c7ced4" />
            <stop offset="0.35" stop-color="#7e8b94" />
            <stop offset="0.7" stop-color="#edf1f4" />
            <stop offset="1" stop-color="#5b666d" />
          </linearGradient>

          <pattern id="steelLines" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(22)">
            <path d="M0 2H10 M0 7H10" stroke="#ffffff" opacity="0.22" stroke-width="1" />
          </pattern>

          <linearGradient id="yellowEgg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#fff6a0" />
            <stop offset="0.55" stop-color="#ffe04d" />
            <stop offset="1" stop-color="#df9e1f" />
          </linearGradient>

          <linearGradient id="greenEgg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#4caf70" />
            <stop offset="0.55" stop-color="#245f3d" />
            <stop offset="1" stop-color="#133923" />
          </linearGradient>

          <filter id="orangeGlow" x="-160%" y="-160%" width="420%" height="420%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1  0 0.55 0 0 0.33  0 0 0.1 0 0  0 0 0 1 0" result="glow" />
            <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>

          <filter id="softShadow" x="-60%" y="-60%" width="220%" height="220%">
            <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.35" />
          </filter>

          <filter id="hitGlow" x="-80%" y="-80%" width="260%" height="260%">
            <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#fff2a1" flood-opacity="0.9" />
          </filter>
        </defs>

        <rect x="0" y="0" width="960" height="640" fill="#191d20" />
        <rect x="42" y="32" width="876" height="568" rx="22" fill="url(#groundNoise)" stroke="rgba(255,255,255,0.16)" />
        <text x="72" y="46" class="pixel-text" font-size="13" fill="#f3ead0" opacity="0.68">SVG BATTLE MAP / TOP-DOWN EGG TANKS</text>

        <g id="mapLayer"></g>
        <g id="trailLayer"></g>
        <g id="bulletLayer"></g>
        <g id="tankLayer"></g>
        <g id="bushLayer"></g>
        <g id="particleLayer"></g>
      </svg>

      <div id="overlay" class="overlay">
        <div class="modal">
          <h2 id="overlayTitle">遊戲結束</h2>
          <p id="overlayDesc">重新挑戰這座雞蛋戰車迷宮。</p>
          <button id="restartBtn">重新開始</button>
        </div>
      </div>
    </section>

    <div class="help">
      <span>移動：<i class="kbd">W</i><i class="kbd">A</i><i class="kbd">S</i><i class="kbd">D</i> 或方向鍵　射擊：<i class="kbd">Space</i></span>
      <span>滑鼠可瞄準炮塔；所有角色、炮彈、牆面與粒子皆由 SVG 繪製。</span>
    </div>
  </main>

  <script>
    (() => {
      'use strict';

      const svgNS = 'http://www.w3.org/2000/svg';
      const svg = document.getElementById('gameSvg');
      const mapLayer = document.getElementById('mapLayer');
      const trailLayer = document.getElementById('trailLayer');
      const bulletLayer = document.getElementById('bulletLayer');
      const tankLayer = document.getElementById('tankLayer');
      const bushLayer = document.getElementById('bushLayer');
      const particleLayer = document.getElementById('particleLayer');

      const playerHpBar = document.getElementById('playerHpBar');
      const enemyHpBar = document.getElementById('enemyHpBar');
      const playerHpText = document.getElementById('playerHpText');
      const enemyHpText = document.getElementById('enemyHpText');
      const scoreText = document.getElementById('scoreText');
      const overlay = document.getElementById('overlay');
      const overlayTitle = document.getElementById('overlayTitle');
      const overlayDesc = document.getElementById('overlayDesc');
      const restartBtn = document.getElementById('restartBtn');

      const CELL = 40;
      const OFFSET_X = 80;
      const OFFSET_Y = 70;
      const TANK_R = 16;
      const MAX_HP = 3;

      const baseMap = [
        '11111111111111111111',
        '10000003000000000001',
        '10222000111100002201',
        '10003000000100000001',
        '10111103000103111001',
        '10000000000000003001',
        '10002220111022200001',
        '10300000000000000031',
        '10001113000111100001',
        '10000000000300002201',
        '10222111100001110001',
        '10000000003000000001',
        '11111111111111111111'
      ];

      const directions = [
        { x: 1, y: 0, angle: 0, name: 'right' },
        { x: 0, y: 1, angle: 90, name: 'down' },
        { x: -1, y: 0, angle: 180, name: 'left' },
        { x: 0, y: -1, angle: -90, name: 'up' }
      ];

      let map = [];
      let player;
      let enemy;
      let bullets = [];
      let particles = [];
      let gameState = 'running';
      let score = 0;
      let lastTime = performance.now();
      let enemyDecisionTimer = 0;
      let mouseAim = false;
      let mouse = { x: 0, y: 0 };
      let lastInputDir = { x: 1, y: 0, angle: 0, name: 'right' };

      const keys = { up: false, down: false, left: false, right: false, space: false };

      function el(name, attrs = {}) {
        const node = document.createElementNS(svgNS, name);
        for (const [key, value] of Object.entries(attrs)) {
          if (value !== undefined && value !== null) node.setAttribute(key, String(value));
        }
        return node;
      }

      function centerOfCell(col, row) {
        return {
          x: OFFSET_X + col * CELL + CELL / 2,
          y: OFFSET_Y + row * CELL + CELL / 2
        };
      }

      function tileAt(x, y) {
        const col = Math.floor((x - OFFSET_X) / CELL);
        const row = Math.floor((y - OFFSET_Y) / CELL);
        if (row < 0 || col < 0 || row >= map.length || col >= map[0].length) return 1;
        return Number(map[row][col]);
      }

      function isBlockingForTank(tile) {
        return tile === 1 || tile === 2;
      }

      function isBlockedAt(x, y, radius = TANK_R) {
        const points = [
          [x - radius, y - radius], [x + radius, y - radius],
          [x - radius, y + radius], [x + radius, y + radius],
          [x, y - radius], [x, y + radius], [x - radius, y], [x + radius, y]
        ];
        return points.some(([px, py]) => isBlockingForTank(tileAt(px, py)));
      }

      function angleTo(a, b) {
        return Math.atan2(b.y - a.y, b.x - a.x) * 180 / Math.PI;
      }

      function degToRad(deg) {
        return deg * Math.PI / 180;
      }

      function normalizeAngle(deg) {
        let d = deg % 360;
        if (d > 180) d -= 360;
        if (d < -180) d += 360;
        return d;
      }

      function clearNode(node) {
        while (node.firstChild) node.removeChild(node.firstChild);
      }

      function renderMap() {
        clearNode(mapLayer);
        clearNode(bushLayer);

        const mapBg = el('rect', {
          x: OFFSET_X,
          y: OFFSET_Y,
          width: map[0].length * CELL,
          height: map.length * CELL,
          rx: 12,
          fill: 'rgba(0,0,0,0.13)',
          stroke: 'rgba(255,255,255,0.08)'
        });
        mapLayer.appendChild(mapBg);

        for (let row = 0; row < map.length; row++) {
          for (let col = 0; col < map[row].length; col++) {
            const type = Number(map[row][col]);
            const x = OFFSET_X + col * CELL;
            const y = OFFSET_Y + row * CELL;

            if (type === 1) {
              const wall = el('rect', {
                x: x + 1,
                y: y + 1,
                width: CELL - 2,
                height: CELL - 2,
                rx: 5,
                fill: 'url(#brickPattern)',
                stroke: '#3f1b15',
                'stroke-width': 2
              });
              mapLayer.appendChild(wall);
            } else if (type === 2) {
              const steel = el('g');
              steel.appendChild(el('rect', {
                x: x + 3,
                y: y + 3,
                width: CELL - 6,
                height: CELL - 6,
                rx: 6,
                fill: 'url(#steelGrad)',
                stroke: '#354049',
                'stroke-width': 2
              }));
              steel.appendChild(el('rect', {
                x: x + 5,
                y: y + 5,
                width: CELL - 10,
                height: CELL - 10,
                rx: 5,
                fill: 'url(#steelLines)',
                opacity: 0.55
              }));
              mapLayer.appendChild(steel);
            } else if (type === 3) {
              const bush = makeBush(x, y);
              bushLayer.appendChild(bush);
            }
          }
        }
      }

      function makeBush(x, y) {
        const g = el('g', { opacity: 0.78 });
        const colors = ['#7ce879', '#3bb35f', '#1f7e48', '#a4ff98'];
        const blobs = [
          [14, 16, 15, 10], [25, 14, 13, 11], [20, 25, 18, 11],
          [9, 27, 10, 8], [30, 29, 10, 8], [10, 8, 8, 7]
        ];
        blobs.forEach((b, i) => {
          g.appendChild(el('ellipse', {
            cx: x + b[0], cy: y + b[1], rx: b[2], ry: b[3],
            fill: colors[i % colors.length], opacity: i === 5 ? 0.42 : 0.56
          }));
        });
        g.appendChild(el('rect', { x: x + 4, y: y + 4, width: 32, height: 32, rx: 8, fill: '#68e36e', opacity: 0.12 }));
        return g;
      }

      function buildTank(tank) {
        const g = el('g', { class: 'tank', filter: 'url(#softShadow)' });
        const treadTop = el('rect', { x: -21, y: -20, width: 42, height: 9, rx: 4, fill: '#1b1d1f', stroke: '#050607', 'stroke-width': 1.5 });
        const treadBot = el('rect', { x: -21, y: 11, width: 42, height: 9, rx: 4, fill: '#1b1d1f', stroke: '#050607', 'stroke-width': 1.5 });
        const stripeTop = el('path', { d: 'M-18 -15.5H18', class: 'treadStripe', stroke: '#6d757b', 'stroke-width': 3, 'stroke-linecap': 'round' });
        const stripeBot = el('path', { d: 'M-18 15.5H18', class: 'treadStripe', stroke: '#6d757b', 'stroke-width': 3, 'stroke-linecap': 'round' });

        const body = el('ellipse', {
          cx: 0, cy: 0, rx: 21, ry: 17,
          fill: tank.kind === 'player' ? 'url(#yellowEgg)' : 'url(#greenEgg)',
          stroke: tank.kind === 'player' ? '#8d6200' : '#0c2b19',
          'stroke-width': 2.5
        });
        const shine = el('ellipse', { cx: -5, cy: -7, rx: 9, ry: 5, fill: '#ffffff', opacity: tank.kind === 'player' ? 0.42 : 0.22 });
        const faceDot = el('circle', { cx: 8, cy: -7, r: 2.1, fill: tank.kind === 'player' ? '#926b00' : '#d7ffe5', opacity: 0.65 });

        const turret = el('g', { class: 'turret' });
        turret.appendChild(el('line', {
          x1: 0, y1: 0, x2: 30, y2: 0,
          stroke: tank.kind === 'player' ? '#c1841b' : '#0d2b1c',
          'stroke-width': 8,
          'stroke-linecap': 'round'
        }));
        turret.appendChild(el('line', {
          x1: 3, y1: -1, x2: 30, y2: -1,
          stroke: '#ffffff',
          'stroke-width': 1.5,
          opacity: 0.38,
          'stroke-linecap': 'round'
        }));
        turret.appendChild(el('ellipse', {
          cx: 0, cy: 0, rx: 12, ry: 10,
          fill: tank.kind === 'player' ? '#ffd13e' : '#1b7445',
          stroke: tank.kind === 'player' ? '#956400' : '#0c2f1d',
          'stroke-width': 2
        }));
        turret.appendChild(el('ellipse', { cx: -3, cy: -4, rx: 5, ry: 3, fill: '#ffffff', opacity: 0.35 }));

        const crack = el('path', {
          d: 'M-4 -14 L2 -7 L-2 -2 L5 4 L1 12 M8 -10 L12 -3 L7 2',
          stroke: '#fff8d5',
          'stroke-width': 2,
          fill: 'none',
          opacity: 0,
          'stroke-linecap': 'round',
          'stroke-linejoin': 'round'
        });

        g.appendChild(treadTop);
        g.appendChild(treadBot);
        g.appendChild(stripeTop);
        g.appendChild(stripeBot);
        g.appendChild(body);
        g.appendChild(shine);
        g.appendChild(faceDot);
        g.appendChild(turret);
        g.appendChild(crack);

        tank.node = g;
        tank.turretNode = turret;
        tank.crackNode = crack;
        tankLayer.appendChild(g);
      }

      function resetGame() {
        map = baseMap.map(row => row.split('').map(Number));
        bullets = [];
        particles = [];
        score = 0;
        gameState = 'running';
        enemyDecisionTimer = 0;
        mouseAim = false;
        lastInputDir = directions[0];

        const p = centerOfCell(1, 1);
        const e = centerOfCell(18, 11);
        player = makeTankState('player', p.x, p.y, 0, 142);
        enemy = makeTankState('enemy', e.x, e.y, 180, 72);
        enemy.dir = directions[2];

        clearNode(tankLayer);
        clearNode(trailLayer);
        clearNode(bulletLayer);
        clearNode(particleLayer);
        renderMap();
        buildTank(player);
        buildTank(enemy);
        overlay.classList.remove('active');
        updateUI();
        lastTime = performance.now();
      }

      function makeTankState(kind, x, y, angle, speed) {
        return {
          kind, x, y, angle, turretAngle: angle, speed,
          hp: MAX_HP,
          cooldown: 0,
          hitTimer: 0,
          dustTimer: 0,
          moving: false,
          dir: directions[0],
          node: null,
          turretNode: null,
          crackNode: null
        };
      }

      function getPlayerDirection() {
        const pressed = [];
        if (keys.right) pressed.push(directions[0]);
        if (keys.down) pressed.push(directions[1]);
        if (keys.left) pressed.push(directions[2]);
        if (keys.up) pressed.push(directions[3]);
        if (!pressed.length) return null;
        const stillHeld = pressed.find(d => d.name === lastInputDir.name);
        return stillHeld || pressed[pressed.length - 1];
      }

      function moveTank(tank, dir, dt) {
        if (!dir || tank.hp <= 0) {
          tank.moving = false;
          return;
        }
        const nx = tank.x + dir.x * tank.speed * dt;
        const ny = tank.y + dir.y * tank.speed * dt;
        let moved = false;

        if (!isBlockedAt(nx, tank.y)) {
          tank.x = nx;
          moved = true;
        }
        if (!isBlockedAt(tank.x, ny)) {
          tank.y = ny;
          moved = true;
        }

        tank.moving = moved;
        tank.angle = dir.angle;
        tank.dir = dir;

        if (moved) {
          tank.dustTimer -= dt;
          if (tank.dustTimer <= 0) {
            spawnDust(tank);
            tank.dustTimer = 0.06;
          }
        }
      }

      function updatePlayer(dt) {
        const dir = getPlayerDirection();
        moveTank(player, dir, dt);
        if (!mouseAim) player.turretAngle = player.angle;
        else player.turretAngle = angleTo(player, mouse);

        if (keys.space) fireBullet(player, 'player');
      }

      function updateEnemy(dt) {
        if (enemy.hp <= 0 || gameState !== 'running') return;

        enemy.turretAngle = angleTo(enemy, player);
        enemyDecisionTimer -= dt;

        if (enemyDecisionTimer <= 0) {
          enemy.dir = chooseEnemyDirection();
          enemyDecisionTimer = 0.42 + Math.random() * 0.55;
        }

        const oldX = enemy.x;
        const oldY = enemy.y;
        moveTank(enemy, enemy.dir, dt);
        if (Math.abs(enemy.x - oldX) + Math.abs(enemy.y - oldY) < 0.5) {
          enemy.dir = directions[Math.floor(Math.random() * directions.length)];
          enemyDecisionTimer = 0.18;
        }

        enemy.cooldown -= dt;
        if (enemy.cooldown <= 0 && distance(enemy, player) < 520) {
          fireBullet(enemy, 'enemy');
          enemy.cooldown = 1.15 + Math.random() * 0.45;
        }
      }

      function chooseEnemyDirection() {
        const dx = player.x - enemy.x;
        const dy = player.y - enemy.y;
        const primary = Math.abs(dx) > Math.abs(dy)
          ? (dx > 0 ? directions[0] : directions[2])
          : (dy > 0 ? directions[1] : directions[3]);
        const secondary = Math.abs(dx) > Math.abs(dy)
          ? (dy > 0 ? directions[1] : directions[3])
          : (dx > 0 ? directions[0] : directions[2]);
        const candidates = [primary, secondary, directions[Math.floor(Math.random() * directions.length)]];
        return candidates.find(d => !isBlockedAt(enemy.x + d.x * 26, enemy.y + d.y * 26)) || directions[Math.floor(Math.random() * directions.length)];
      }

      function fireBullet(tank, owner) {
        if (tank.cooldown > 0 || gameState !== 'running' || tank.hp <= 0) return;
        const rad = degToRad(tank.turretAngle);
        const muzzleX = tank.x + Math.cos(rad) * 32;
        const muzzleY = tank.y + Math.sin(rad) * 32;
        bullets.push({
          x: muzzleX, y: muzzleY,
          vx: Math.cos(rad) * 315,
          vy: Math.sin(rad) * 315,
          owner,
          life: 2.2,
          r: 5
        });
        tank.cooldown = owner === 'player' ? 0.32 : tank.cooldown;
        spawnMuzzleFlash(muzzleX, muzzleY, rad);
      }

      function updateBullets(dt) {
        const next = [];
        for (const bullet of bullets) {
          bullet.life -= dt;
          bullet.x += bullet.vx * dt;
          bullet.y += bullet.vy * dt;

          const tile = tileAt(bullet.x, bullet.y);
          if (bullet.life <= 0 || tile === 1 || tile === 2 || tile === 3) {
            spawnExplosion(bullet.x, bullet.y, tile === 2 ? 8 : 12);
            continue;
          }

          const target = bullet.owner === 'player' ? enemy : player;
          if (target.hp > 0 && distance(bullet, target) < 20) {
            damageTank(target);
            spawnExplosion(bullet.x, bullet.y, 18);
            if (bullet.owner === 'player') score += 100;
            continue;
          }

          next.push(bullet);
        }
        bullets = next;
      }

      function damageTank(tank) {
        tank.hp = Math.max(0, tank.hp - 1);
        tank.hitTimer = 0.48;
        updateUI();
        if (tank.hp <= 0) {
          spawnExplosion(tank.x, tank.y, 32);
          if (tank.kind === 'enemy') endGame(true);
          else endGame(false);
        }
      }

      function endGame(win) {
        gameState = win ? 'win' : 'lost';
        overlayTitle.textContent = win ? '勝利！雞蛋戰車得手' : '蛋殼碎裂，任務失敗';
        overlayDesc.textContent = win
          ? '你擊敗了森林綠雞蛋戰車，成功突破 SVG 迷宮。'
          : '你的檸檬黃雞蛋戰車被擊毀了，再來一場吧。';
        overlay.classList.add('active');
      }

      function updateCooldowns(dt) {
        player.cooldown = Math.max(0, player.cooldown - dt);
        enemy.cooldown = Math.max(0, enemy.cooldown - dt);
        player.hitTimer = Math.max(0, player.hitTimer - dt);
        enemy.hitTimer = Math.max(0, enemy.hitTimer - dt);
      }

      function spawnDust(tank) {
        const back = degToRad(tank.angle + 180);
        const side = degToRad(tank.angle + 90);
        for (let i = 0; i < 2; i++) {
          const offset = (Math.random() - 0.5) * 18;
          const x = tank.x + Math.cos(back) * 20 + Math.cos(side) * offset;
          const y = tank.y + Math.sin(back) * 20 + Math.sin(side) * offset;
          particles.push({
            x, y,
            vx: Math.cos(back) * (20 + Math.random() * 34) + (Math.random() - 0.5) * 25,
            vy: Math.sin(back) * (20 + Math.random() * 34) + (Math.random() - 0.5) * 25,
            life: 0.46,
            max: 0.46,
            size: 2 + Math.random() * 2.8,
            color: '#c8b285',
            type: 'circle'
          });
        }
      }

      function spawnMuzzleFlash(x, y, rad) {
        for (let i = 0; i < 6; i++) {
          const spread = rad + (Math.random() - 0.5) * 0.9;
          particles.push({
            x, y,
            vx: Math.cos(spread) * (55 + Math.random() * 80),
            vy: Math.sin(spread) * (55 + Math.random() * 80),
            life: 0.22,
            max: 0.22,
            size: 2 + Math.random() * 3,
            color: Math.random() > 0.5 ? '#ffea6a' : '#ff8d20',
            type: 'circle'
          });
        }
      }

      function spawnExplosion(x, y, count) {
        for (let i = 0; i < count; i++) {
          const rad = Math.random() * Math.PI * 2;
          const speed = 55 + Math.random() * 165;
          const palette = ['#ff9d25', '#ffe36a', '#f15a24', '#d1c3a3'];
          particles.push({
            x, y,
            vx: Math.cos(rad) * speed,
            vy: Math.sin(rad) * speed,
            life: 0.42 + Math.random() * 0.22,
            max: 0.62,
            size: 2 + Math.random() * 4,
            color: palette[Math.floor(Math.random() * palette.length)],
            type: 'circle'
          });
        }
      }

      function updateParticles(dt) {
        particles = particles.filter(p => {
          p.life -= dt;
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.vx *= 0.94;
          p.vy *= 0.94;
          return p.life > 0;
        });
      }

      function renderTanks() {
        updateTankNode(player);
        updateTankNode(enemy);
      }

      function updateTankNode(tank) {
        if (!tank.node) return;
        const shake = tank.hitTimer > 0 ? 2.8 : 0;
        const sx = shake ? (Math.random() - 0.5) * shake : 0;
        const sy = shake ? (Math.random() - 0.5) * shake : 0;
        tank.node.setAttribute('transform', `translate(${tank.x + sx} ${tank.y + sy}) rotate(${tank.angle})`);
        tank.turretNode.setAttribute('transform', `rotate(${normalizeAngle(tank.turretAngle - tank.angle)})`);
        tank.node.classList.toggle('moving', tank.moving && tank.hp > 0);
        tank.node.classList.toggle('hitFlash', tank.hitTimer > 0);
        tank.node.setAttribute('opacity', tank.hp > 0 ? 1 : 0.2);
        tank.node.setAttribute('filter', tank.hitTimer > 0 ? 'url(#hitGlow)' : 'url(#softShadow)');
        tank.crackNode.setAttribute('opacity', tank.hitTimer > 0 || tank.hp < MAX_HP ? 0.82 : 0);
      }

      function renderBullets() {
        clearNode(bulletLayer);
        for (const b of bullets) {
          const angle = Math.atan2(b.vy, b.vx);
          bulletLayer.appendChild(el('line', {
            x1: b.x - Math.cos(angle) * 18,
            y1: b.y - Math.sin(angle) * 18,
            x2: b.x,
            y2: b.y,
            stroke: '#ff8c1a',
            'stroke-width': 4,
            opacity: 0.38,
            'stroke-linecap': 'round',
            filter: 'url(#orangeGlow)'
          }));
          bulletLayer.appendChild(el('circle', {
            cx: b.x, cy: b.y, r: b.r,
            fill: '#ffb02e',
            stroke: '#fff1a8',
            'stroke-width': 1.4,
            filter: 'url(#orangeGlow)'
          }));
        }
      }

      function renderParticles() {
        clearNode(particleLayer);
        for (const p of particles) {
          const opacity = Math.max(0, Math.min(1, p.life / p.max));
          particleLayer.appendChild(el('circle', {
            cx: p.x,
            cy: p.y,
            r: p.size * opacity,
            fill: p.color,
            opacity: opacity,
            filter: p.color.includes('ff') ? 'url(#orangeGlow)' : undefined
          }));
        }
      }

      function updateUI() {
        playerHpText.textContent = player.hp;
        enemyHpText.textContent = enemy.hp;
        playerHpBar.style.width = `${(player.hp / MAX_HP) * 100}%`;
        enemyHpBar.style.width = `${(enemy.hp / MAX_HP) * 100}%`;
        scoreText.textContent = String(score);
      }

      function distance(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y);
      }

      function tick(now) {
        const dt = Math.min(0.033, (now - lastTime) / 1000 || 0);
        lastTime = now;

        if (gameState === 'running') {
          updateCooldowns(dt);
          updatePlayer(dt);
          updateEnemy(dt);
          updateBullets(dt);
          updateParticles(dt);
          updateUI();
        } else {
          updateParticles(dt);
        }

        renderTanks();
        renderBullets();
        renderParticles();
        requestAnimationFrame(tick);
      }

      function setKey(e, value) {
        const key = e.key.toLowerCase();
        let handled = true;
        if (key === 'arrowup' || key === 'w') { keys.up = value; if (value) lastInputDir = directions[3]; }
        else if (key === 'arrowdown' || key === 's') { keys.down = value; if (value) lastInputDir = directions[1]; }
        else if (key === 'arrowleft' || key === 'a') { keys.left = value; if (value) lastInputDir = directions[2]; }
        else if (key === 'arrowright' || key === 'd') { keys.right = value; if (value) lastInputDir = directions[0]; }
        else if (key === ' ') { keys.space = value; }
        else handled = false;
        if (handled) e.preventDefault();
      }

      window.addEventListener('keydown', e => setKey(e, true));
      window.addEventListener('keyup', e => setKey(e, false));

      svg.addEventListener('mousemove', e => {
        const pt = svg.createSVGPoint();
        pt.x = e.clientX;
        pt.y = e.clientY;
        const svgPoint = pt.matrixTransform(svg.getScreenCTM().inverse());
        mouse.x = svgPoint.x;
        mouse.y = svgPoint.y;
        mouseAim = true;
      });

      svg.addEventListener('mouseleave', () => { mouseAim = false; });
      restartBtn.addEventListener('click', resetGame);

      resetGame();
      requestAnimationFrame(tick);
    })();
  </script>
</body>
</html>
