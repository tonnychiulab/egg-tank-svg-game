    <pattern id="brick" width="40" height="40" patternUnits="userSpaceOnUse"><rect width="40" height="40" fill="#7b392b"/><path d="M0 0H40V40H0Z" fill="none" stroke="#4e211a" stroke-width="2" opacity=".65"/><path d="M0 13H40 M0 27H40 M20 0V13 M10 13V27 M30 13V27 M20 27V40" stroke="#a65a3e" stroke-width="2" opacity=".85"/></pattern>
