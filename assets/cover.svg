<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">雞蛋戰車 SVG 迷宮戰</title>
  <desc id="desc">復古像素風與現代 SVG 向量設計結合的雞蛋戰車迷宮遊戲封面</desc>
  <defs>
    <pattern id="noise" width="36" height="36" patternUnits="userSpaceOnUse">
      <rect width="36" height="36" fill="#24282b"/>
      <circle cx="7" cy="9" r="1" fill="#fff" opacity=".08"/>
      <circle cx="25" cy="14" r=".8" fill="#fff" opacity=".06"/>
      <path d="M0 35.5H36 M35.5 0V36" stroke="#fff" opacity=".045"/>
    </pattern>
    <pattern id="brick" width="44" height="44" patternUnits="userSpaceOnUse">
      <rect width="44" height="44" fill="#793628"/>
      <path d="M0 0H44V44H0Z" fill="none" stroke="#421810" stroke-width="2" opacity=".7"/>
      <path d="M0 14H44 M0 30H44 M22 0V14 M12 14V30 M34 14V30 M22 30V44" stroke="#b45e3e" stroke-width="2" opacity=".85"/>
    </pattern>
    <linearGradient id="yellowEgg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff8a8"/><stop offset=".55" stop-color="#ffe04d"/><stop offset="1" stop-color="#d99a20"/>
    </linearGradient>
    <linearGradient id="greenEgg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5bd184"/><stop offset=".55" stop-color="#245f3d"/><stop offset="1" stop-color="#0e291b"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dbe1e6"/><stop offset=".35" stop-color="#7e8b94"/><stop offset=".7" stop-color="#f3f6f8"/><stop offset="1" stop-color="#59646b"/>
    </linearGradient>
    <filter id="glow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="6" result="b"/><feColorMatrix in="b" type="matrix" values="1 0 0 0 1 0 .55 0 0 .32 0 0 .08 0 0 0 0 0 1 0" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="14" stdDeviation="14" flood-opacity=".45"/></filter>
  </defs>
  <rect width="1200" height="630" fill="#101214"/>
  <rect x="54" y="54" width="1092" height="522" rx="34" fill="url(#noise)" stroke="#ffffff" stroke-opacity=".14"/>
  <g opacity=".95">
    <rect x="118" y="132" width="88" height="48" rx="8" fill="url(#brick)"/>
    <rect x="206" y="132" width="88" height="48" rx="8" fill="url(#brick)"/>
    <rect x="294" y="132" width="88" height="48" rx="8" fill="url(#brick)"/>
    <rect x="820" y="132" width="88" height="48" rx="8" fill="url(#brick)"/>
    <rect x="908" y="132" width="88" height="48" rx="8" fill="url(#brick)"/>
    <rect x="996" y="132" width="88" height="48" rx="8" fill="url(#brick)"/>
    <rect x="118" y="446" width="88" height="48" rx="8" fill="url(#brick)"/>
    <rect x="206" y="446" width="88" height="48" rx="8" fill="url(#brick)"/>
    <rect x="908" y="446" width="88" height="48" rx="8" fill="url(#brick)"/>
    <rect x="996" y="446" width="88" height="48" rx="8" fill="url(#brick)"/>
    <rect x="190" y="238" width="70" height="70" rx="12" fill="url(#steel)" stroke="#354049" stroke-width="3"/>
    <rect x="935" y="320" width="70" height="70" rx="12" fill="url(#steel)" stroke="#354049" stroke-width="3"/>
    <g opacity=".72" fill="#43b66c">
      <circle cx="270" cy="355" r="30"/><circle cx="305" cy="350" r="26"/><circle cx="288" cy="382" r="28"/><circle cx="1020" cy="250" r="26"/><circle cx="1050" cy="265" r="30"/><circle cx="1008" cy="280" r="22"/>
    </g>
  </g>
  <g transform="translate(370 330) rotate(-18) scale(1.35)" filter="url(#shadow)">
    <rect x="-48" y="-30" width="96" height="18" rx="9" fill="#3a4146"/><rect x="-48" y="14" width="96" height="18" rx="9" fill="#3a4146"/>
    <path d="M-22 -42 C22 -52 48 -18 44 18 C38 54 -36 52 -44 14 C-50 -18 -44 -34 -22 -42Z" fill="url(#yellowEgg)" stroke="#fff2a3" stroke-width="3"/>
    <ellipse cx="-14" cy="-17" rx="13" ry="7" fill="#fff" opacity=".32"/>
    <g transform="rotate(22)"><ellipse cx="10" cy="0" rx="24" ry="18" fill="#ffd33f" stroke="#af7d1b" stroke-width="3"/><rect x="26" y="-6" width="52" height="12" rx="6" fill="#efbc2f" stroke="#8f661a" stroke-width="2"/></g>
  </g>
  <g transform="translate(830 300) rotate(160) scale(1.25)" filter="url(#shadow)">
    <rect x="-48" y="-30" width="96" height="18" rx="9" fill="#2b3337"/><rect x="-48" y="14" width="96" height="18" rx="9" fill="#2b3337"/>
    <path d="M-22 -42 C22 -52 48 -18 44 18 C38 54 -36 52 -44 14 C-50 -18 -44 -34 -22 -42Z" fill="url(#greenEgg)" stroke="#7ad694" stroke-width="3"/>
    <ellipse cx="-14" cy="-17" rx="13" ry="7" fill="#fff" opacity=".20"/>
    <g transform="rotate(-8)"><ellipse cx="10" cy="0" rx="24" ry="18" fill="#285f3d" stroke="#112c1d" stroke-width="3"/><rect x="26" y="-6" width="52" height="12" rx="6" fill="#1b432c" stroke="#0d2518" stroke-width="2"/></g>
  </g>
  <circle cx="606" cy="314" r="15" fill="#ff9d25" filter="url(#glow)"/>
  <path d="M445 316 C505 300 545 300 588 310" stroke="#ff9d25" stroke-width="7" stroke-linecap="round" opacity=".45" filter="url(#glow)"/>
  <text x="600" y="205" text-anchor="middle" font-family="Noto Sans CJK TC, Noto Sans CJK, sans-serif" font-size="64" font-weight="800" fill="#fff4c2" letter-spacing="3">雞蛋戰車 SVG 迷宮戰</text>
  <text x="600" y="255" text-anchor="middle" font-family="Noto Sans CJK TC, Noto Sans CJK, sans-serif" font-size="26" fill="#d8d2bd">Egg Tank SVG Maze Battle</text>
